                questions: [
                    { q: "מה פירוש 'נחתום'?", a: ["בעל בית", "אופה", "סוחר", "חקלאי"], c: 1 },
                    { q: "למה בכיכרות של בעל הבית חייב להכריז?", a: ["כי הן טעימות", "כי יש בהן סימן ייחודי", "כי הן גדולות", "כי הן נדירות"], c: 1 },
                    { q: "איזו סברא הלכתית רבה מביא כדי להסביר מדוע לא דורכים על לחם?", a: ["בל תשחית", "אין מעבירין על האוכלין", "סכנת נפשות", "מראית עין"], c: 1 },
                    { q: "למה הגויים לא דורכים על לחם לפי הגמרא?", a: ["מכבוד לישראל", "מחשש לכשפים", "כי זה מלוכלך", "כי הם שומרים מצוות"], c: 1 },
                    { q: "מה שואלת הגמרא אחרי התירוץ על הגויים?", a: ["מה עם ישראל?", "ומה עם בהמה וכלבים?", "מתי זה קרה?", "מי המאבד?"], c: 1 },
                    { q: "איך רבה מיישב את שאלת הבהמות?", a: ["הן לא אוהבות לחם", "במקום שלא שכיחים בו חיות", "הלחם היה מורעל", "הלחם היה גבוה"], c: 1 },
                    { q: "מהי המשמעות של 'אין מעבירין על האוכלין'?", a: ["אסור להעביר אוכל", "לא פוסעים מעל או דורכים על אוכל", "חובה לחלק אוכל", "אסור למכור אוכל"], c: 1 },
                    { q: "מה פירוש 'הא של בעל הבית'?", a: ["אבל אם זה של בעל הבית", "זה בתוך הבית", "בעל הבית מצא", "הבית נפל"], c: 0 },
                    { q: "למה בכיכרות של נחתום 'הרי אלו שלו'?", a: ["כי הן זולות", "כי אין בהן סימן (הן כולן דומות)", "כי האופה מפקיר", "כי זה לחם ישן"], c: 1 },
                    { q: "מי הקשה את הקושיא מכיכרות נחתום?", a: ["רבה", "רבא (או הגמרא לרבה)", "רב פפא", "המשנה"], c: 1 }
                ]
            }
        ];

        let currentStep = 0;
        const answersState = {};

        function initTabs() {
            const tabsContainer = document.getElementById('tabs');
            tabsContainer.innerHTML = studyData.map((data, i) => `
                <button onclick="jumpToStep(${i})" id="tab-${i}" 
                        class="px-4 py-2 whitespace-nowrap text-sm font-medium focus:outline-none ${i === 0 ? 'tab-active' : 'text-gray-500'}">
                    ${data.title}
                </button>
            `).join('');
        }

        function renderStep() {
            const contentContainer = document.getElementById('content-container');
            const quizContainer = document.getElementById('quiz-container');
            const data = studyData[currentStep];
            
            contentContainer.innerHTML = `
                <h2 class="text-2xl font-bold mb-6 text-indigo-800 border-b-2 border-indigo-100 pb-2">${data.title}</h2>
                <div>
                    ${data.content.map(item => `
                        <div class="mb-4">
                            <span class="gemara-font">${item.g}</span>
                            <div class="translation-font">${item.t}</div>
                        </div>
                    `).join('')}
                </div>
            `;

            quizContainer.innerHTML = `
                <h3 class="text-xl font-bold mb-6 flex items-center">
                    <span class="bg-indigo-600 text-white w-8 h-8 rounded-full flex items-center justify-center ml-2 text-sm">?</span>
                    שאלות חזרה ושינון (ענה על כולן!)
                </h3>
                <div class="space-y-8">
                    ${data.questions.map((q, i) => {
                        const saved = answersState[`${currentStep}-${i}`];
                        return `
                        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100" id="q-${currentStep}-${i}">
                            <p class="font-bold text-lg mb-4 text-gray-800">${i + 1}. ${q.q}</p>
                            <div class="grid grid-cols-1 gap-3">
                                ${q.a.map((opt, oi) => {
                                    let btnClass = "border-2 border-gray-200 text-right p-4 rounded-xl hover:bg-indigo-50 transition-all";
                                    let disabled = "";
                                    if (saved !== undefined) {
                                        disabled = "disabled";
                                        if (oi === q.c) btnClass += " correct";
                                        else if (oi === saved.selected && oi !== q.c) btnClass += " incorrect";
                                    }
                                    return `
                                    <button ${disabled} onclick="checkAnswer(${currentStep}, ${i}, ${oi}, ${q.c})" 
                                            class="${btnClass}">
                                        ${opt}
                                    </button>
                                `;}).join('')}
                            </div>
                        </div>
                    `}).join('')}
                </div>
            `;

            updateUI();
        }

        function checkAnswer(step, qIdx, selectedIdx, correctIdx) {
            answersState[`${step}-${qIdx}`] = { selected: selectedIdx, isCorrect: selectedIdx === correctIdx };
            renderStep();
        }

        function jumpToStep(step) {
            currentStep = step;
            renderStep();
        }

        function changeStep(delta) {
            const next = currentStep + delta;
            if (next >= 0 && next < studyData.length) {
                currentStep = next;
                renderStep();
            }
        }

        function updateUI() {
            studyData.forEach((_, i) => {
                const tab = document.getElementById(`tab-${i}`);
                if (tab) {
                    if (i === currentStep) tab.className = "px-4 py-2 whitespace-nowrap text-sm font-medium focus:outline-none tab-active";
                    else tab.className = "px-4 py-2 whitespace-nowrap text-sm font-medium focus:outline-none text-gray-500";
                }
            });

            document.getElementById('progress-text').innerText = `חלק ${currentStep + 1} מתוך ${studyData.length}`;
            document.getElementById('prev-btn').disabled = currentStep === 0;
            document.getElementById('prev-btn').style.opacity = currentStep === 0 ? "0.5" : "1";
            
            const nextBtn = document.getElementById('next-btn');
            if (currentStep === studyData.length - 1) {
                nextBtn.innerText = "סיים לימוד";
                nextBtn.onclick = showSummary;
            } else {
                nextBtn.innerText = "הבא";
                nextBtn.onclick = () => changeStep(1);
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showSummary() {
            let correctCount = 0;
            let totalQuestions = 0;
            studyData.forEach((step, sIdx) => {
                step.questions.forEach((_, qIdx) => {
                    totalQuestions++;
                    if (answersState[`${sIdx}-${qIdx}`]?.isCorrect) correctCount++;
                });
            });

            document.getElementById('content-container').innerHTML = `
                <div class="text-center p-8">
                    <h2 class="text-4xl font-bold text-indigo-900 mb-4">יישר כוח! סיימת את החזרה</h2>
                    <div class="text-6xl mb-6">📚</div>
                    <p class="text-2xl mb-4 text-gray-700">הצלחת לענות נכון על <span class="text-green-600 font-bold">${correctCount}</span> שאלות מתוך ${totalQuestions}</p>
                    <div class="bg-indigo-50 p-6 rounded-2xl mb-6">
                        <p class="text-lg text-indigo-800 font-bold italic">"תורה שלמדתי באף היא שעמדה לי"</p>
                    </div>
                    <p class="text-sm text-gray-500 mb-8">נוצר ע"י אורי אברהם ישרזדה</p>
                    <button onclick="location.reload()" class="bg-indigo-600 text-white px-10 py-4 rounded-full font-bold shadow-xl hover:bg-indigo-700 transition-all">התחל מחדש</button>
                </div>
            `;
            document.getElementById('quiz-container').innerHTML = "";
            document.getElementById('tabs').style.display = "none";
        }

        initTabs();
        renderStep();
    </script>
</body>
</html>
